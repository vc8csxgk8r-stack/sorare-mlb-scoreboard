version: "3.9"

services:

  # ── App principale Streamlit + API FastAPI ─────────────────────────────────
  sorare-mlb:
    build: .
    image: sorare-mlb-scoreboard:latest
    container_name: sorare-mlb
    restart: unless-stopped

    ports:
      - "8501:8501"    # Streamlit  → http://ton-ip:8501
      - "8502:8502"    # FastAPI    → http://ton-ip:8502/api/dashboard

    volumes:
      - sorare_mlb_data:/data

    environment:
      - DB_PATH=/data/sorare_mlb.db
      - TZ=Europe/Paris
      - PYTHONUNBUFFERED=1

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 25s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Dashboard TV (HTML statique Nginx) ─────────────────────────────────────
  dashboard-tv:
    image: nginx:alpine
    container_name: sorare-dashboard-tv
    restart: unless-stopped
    depends_on:
      - sorare-mlb

    ports:
      - "8080:80"      # Dashboard TV → http://ton-ip:8080

    volumes:
      - ./dashboard/index.html:/usr/share/nginx/html/index.html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  sorare_mlb_data:
    driver: local
