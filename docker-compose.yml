version: "3.9"

services:
  sorare-mlb:
    build: .
    image: sorare-mlb-scoreboard:latest
    container_name: sorare-mlb
    restart: unless-stopped

    ports:
      - "8501:8501"

    volumes:
      # Base de données persistante — survit aux redémarrages
      - sorare_mlb_data:/data

    environment:
      - DB_PATH=/data/sorare_mlb.db
      - TZ=America/New_York   # Timezone matchs MLB (ET)
      - PYTHONUNBUFFERED=1

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  sorare_mlb_data:
    driver: local
