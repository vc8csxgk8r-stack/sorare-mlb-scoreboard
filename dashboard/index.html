<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920"/>
<title>Dashboard ⚾ MLB × 🍺 Brasserie</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;
  --green:#3fb950;--red:#f85149;
  --blue:#388bfd;--blue-l:#79c0ff;
  --gold:#f1c40f;--amber:#ffa657;--purple:#d2a8ff;
  --font:'Inter',system-ui,sans-serif;
  --hdr:56px;
  /* Taille fixe des cartes joueur */
  --card-w:96px;
  --card-h:128px;
}
html,body{width:100vw;height:100vh;overflow:hidden;
  background:var(--bg);color:var(--text);font-family:var(--font);}

/* ═══ Layout ═══ */
#app{display:flex;width:100vw;height:100vh;}
.panel{width:50vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#panel-mlb{border-right:2px solid var(--border);}

/* ═══ Header ═══ */
.hdr{height:var(--hdr);display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border-bottom:1px solid var(--border);flex-shrink:0;}
.hdr-l{display:flex;flex-direction:column;gap:1px;}
.hdr-title{font-size:.95rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
.hdr-sub{font-size:.65rem;color:var(--muted);}
.hdr-clock{font-size:1.3rem;font-weight:800;font-variant-numeric:tabular-nums;
  color:var(--blue-l);}

/* ═══ GW Banner ═══ */
#gw-banner{display:flex;align-items:center;padding:7px 18px;gap:12px;
  background:linear-gradient(135deg,#161b22,#1c2128);
  border-bottom:1px solid var(--border);flex-shrink:0;}
.gw-lbl{font-size:.53rem;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;}
.gw-name{font-size:.85rem;font-weight:700;}
.gw-dates{font-size:.63rem;color:var(--muted);}
.gw-badge{background:var(--bg3);color:var(--blue-l);border-radius:5px;
  padding:2px 8px;font-size:.63rem;font-weight:800;white-space:nowrap;}
.gw-score-big{font-size:1.4rem;font-weight:900;}
.pos{color:var(--green);}.neg{color:var(--red);}.muted{color:var(--muted);}

/* ═══ So7 ═══ */
#so7-section{padding:8px 18px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
.sec-title{font-size:.55rem;font-weight:800;color:var(--muted);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
#so7-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:4px 7px;display:flex;align-items:center;gap:5px;}
.sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sc-info{flex:1;min-width:0;}
.sc-pos{font-size:.5rem;font-weight:700;color:var(--muted);text-transform:uppercase;}
.sc-name{font-size:.73rem;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-team{font-size:.53rem;color:var(--muted);}
.sc-score{font-size:.9rem;font-weight:900;white-space:nowrap;}
#so7-foot{display:flex;justify-content:space-between;
  font-size:.63rem;color:var(--muted);margin-top:3px;}

/* ═══ Section grille joueurs ═══ */
#grid-section{flex:1;overflow:hidden;padding:7px 18px 8px;
  display:flex;flex-direction:column;gap:5px;}

/* Conteneur scrollable horizontalement si trop de joueurs */
#cards-viewport{
  overflow:hidden;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
}

/* Rangée de cartes */
.cards-row{
  display:flex;
  gap:6px;
  flex-shrink:0;
}

/* ═══ Carte joueur — taille FIXE ═══ */
.pcard{
  width:var(--card-w);
  height:var(--card-h);
  flex-shrink:0;
  background:var(--bg2);
  border:2px solid var(--border);
  border-radius:9px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  transition:border-color .15s;
  cursor:default;
}
.pcard:hover{border-color:var(--blue);}
.pcard.r1{border-color:var(--gold);box-shadow:0 0 8px #f1c40f44;}
.pcard.r2{border-color:#95a5a6;}
.pcard.r3{border-color:#cd7f32;}
.pcard.dns-card{opacity:.55;}

/* Bandeau top — position + badge rôle */
.pc-top{
  flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:2px 5px;
  background:rgba(0,0,0,.4);
  font-size:.5rem;font-weight:700;color:var(--muted);
}
.pc-role-p{color:var(--blue-l);}
.pc-role-h{color:#aaa;}
.pc-rank{font-size:.58rem;color:var(--gold);}

/* Photo */
.pc-photo{
  flex:1;
  overflow:hidden;
  display:flex;align-items:flex-end;justify-content:center;
  background:linear-gradient(180deg,#181f2c 0%,#101520 100%);
  padding:2px 1px 0;
}
.pc-photo img{
  width:var(--card-w);
  height:72px;
  object-fit:cover;
  object-position:top center;
  border-radius:3px 3px 0 0;
  display:block;
}

/* Prénom court */
.pc-name{
  flex-shrink:0;
  font-size:.62rem;font-weight:700;text-align:center;
  padding:2px 3px 1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:var(--text);
}

/* ═══ Score — le plus important — ═══ */
.pc-score-wrap{
  flex-shrink:0;
  background:#0a0e14;
  border-top:1px solid var(--border);
  padding:3px 4px 4px;
  text-align:center;
}
.pc-score-val{
  font-size:1.05rem;
  font-weight:900;
  line-height:1;
  letter-spacing:-.02em;
}
.pc-score-val.sc-pos{color:var(--green);}
.pc-score-val.sc-neg{color:var(--red);}
.pc-score-val.sc-dns{color:var(--muted);font-size:.72rem;}
.pc-score-gw{
  font-size:.53rem;color:var(--blue-l);font-weight:700;
  margin-top:1px;white-space:nowrap;
}

/* Dots pagination */
#pgdots{flex-shrink:0;display:flex;justify-content:center;gap:4px;}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--border);
  cursor:pointer;transition:background .2s,transform .2s;}
.pdot.on{background:var(--blue);transform:scale(1.5);}

/* ═══ Brasserie ═══ */
#panel-brew{background:var(--bg);}
#brew-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#brew-statusbar{display:flex;gap:6px;padding:5px 18px 3px;flex-shrink:0;}
.bchip{background:var(--bg3);border:1px solid var(--border);border-radius:5px;
  padding:2px 8px;font-size:.63rem;font-weight:700;}
.brew-link{background:var(--bg3);border:1px solid #388bfd55;border-radius:5px;
  padding:2px 10px;font-size:.63rem;font-weight:700;color:var(--blue-l);
  text-decoration:none;margin-left:auto;}
.brew-link:hover{background:#1a2d4d;}

/* Contenu brassins */
#brew-cards{flex:1;overflow:hidden;padding:8px 18px 0;position:relative;}
.bc{background:linear-gradient(135deg,var(--bg2),#1a1f27);
  border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.bc-hdr{display:flex;align-items:center;padding:10px 14px;gap:10px;
  border-bottom:1px solid var(--border);}
.bc-icon{font-size:1.5rem;flex-shrink:0;}
.bc-title{font-size:.92rem;font-weight:800;}
.bc-meta{font-size:.62rem;color:var(--muted);margin-top:1px;}
.bc-badge{margin-left:auto;flex-shrink:0;padding:2px 8px;border-radius:9px;
  font-size:.58rem;font-weight:800;}
.s-ferm  {background:#1a4d3a;color:#3fb950;border:1px solid #3fb950;}
.s-ready {background:#2d3d1a;color:#8fe87e;border:1px solid #8fe87e;}
.s-bottle{background:#1a2d4d;color:var(--blue-l);border:1px solid var(--blue-l);}
.s-done  {background:#2d1a4d;color:var(--purple);border:1px solid var(--purple);}
.bc-body{padding:10px 14px;}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bar-f{height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--blue),var(--green));}
.bar-f.btl{background:linear-gradient(90deg,var(--blue-l),var(--purple));}
.bar-pct{font-size:.7rem;font-weight:800;color:var(--blue-l);white-space:nowrap;}
.bstats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.bst{background:var(--bg3);border-radius:6px;padding:6px 8px;text-align:center;}
.bst-l{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.bst-v{font-size:.85rem;font-weight:800;margin-top:1px;}
.dc{display:flex;align-items:flex-end;gap:2px;height:26px;margin-top:8px;}
.dcb{flex:1;background:#1f6feb33;border:1px solid #388bfd44;
  border-radius:2px 2px 0 0;min-height:2px;}
.brew-note{margin-top:7px;font-size:.62rem;color:var(--muted);
  background:var(--bg3);border-radius:5px;padding:4px 8px;}

#brew-dots{display:flex;justify-content:center;gap:4px;
  padding:6px 0 4px;flex-shrink:0;}

/* Erreur / loading */
.err{color:var(--red);font-size:.7rem;background:#6e1c1c;border-radius:5px;padding:4px 9px;}
.spin{animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div id="app">

<!-- ══════════ MLB ══════════ -->
<div class="panel" id="panel-mlb">

  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-title">⚾ Sorare MLB</div>
      <div class="hdr-sub" id="mlb-date">—</div>
    </div>
    <div class="hdr-clock" id="clock">--:--:--</div>
  </div>

  <div id="gw-banner">
    <div>
      <div class="gw-lbl">Gameweek en cours</div>
      <div class="gw-name" id="gw-name"><span class="spin muted">…</span></div>
      <div class="gw-dates" id="gw-dates"></div>
    </div>
    <div class="gw-badge" id="gw-prog"></div>
    <div style="margin-left:auto;text-align:right;">
      <div class="gw-lbl">Score GW équipe</div>
      <div class="gw-score-big" id="gw-tot">—</div>
    </div>
  </div>

  <div id="mlb-content" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">

    <div id="so7-section">
      <div class="sec-title">🏆 Meilleure So7 — GW en cours</div>
      <div id="so7-grid">
        <div class="muted spin" style="grid-column:1/-1;font-size:.7rem;padding:4px">Calcul…</div>
      </div>
      <div id="so7-foot">
        <span id="so7-total"></span>
        <span id="so7-info" class="muted"></span>
      </div>
    </div>

    <div id="grid-section">
      <div class="sec-title" id="grid-title">📊 Scores du jour</div>
      <div id="cards-viewport"></div>
      <div id="pgdots"></div>
    </div>

  </div>
</div>

<!-- ══════════ BRASSERIE ══════════ -->
<div class="panel" id="panel-brew">

  <div class="hdr">
    <div class="hdr-l">
      <div class="hdr-title">🍺 La Brasserie</div>
      <div class="hdr-sub" id="brew-sub">Chargement…</div>
    </div>
    <div style="font-size:1.5rem;">🍻</div>
  </div>

  <div id="brew-body">
    <div id="brew-statusbar">
      <div class="bchip" id="bchip-ferm">—</div>
      <div class="bchip" id="bchip-tot">—</div>
      <a class="brew-link" id="brew-edit-link" href="#" target="_blank">✏️ Gérer les brassins →</a>
    </div>

    <div id="brew-cards"></div>
    <div id="brew-dots"></div>
  </div>

</div>

</div><!-- #app -->

<script>
// ══════════════════════════════════
// CONFIG
// ══════════════════════════════════
const HOST     = window.location.hostname;
const MLB_API  = `http://${HOST}:8504`;
const BREW_API = `http://${HOST}:8503`;
const BREW_APP = `http://${HOST}:8502`;   // Streamlit Brassicole pour édition

const MLB_REFRESH  = 60_000;
const BREW_REFRESH = 120_000;
const PAGE_MS      = 5_000;
const BREW_MS      = 7_000;

// Lien vers l'appli Brassicole pour édition
document.getElementById('brew-edit-link').href = BREW_APP;

const SLOT_ORDER  = ['SP','RP','C_MI','CI','OF','XH','FLEX'];
const SLOT_COLORS = {SP:'#388bfd',RP:'#79c0ff',C_MI:'#d2a8ff',
  CI:'#f0883e',OF:'#3fb950',XH:'#ffa657',FLEX:'#ff7b72'};

// ══════════════════════════════════
// HORLOGE
// ══════════════════════════════════
const FR_J=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const FR_M=['janvier','février','mars','avril','mai','juin',
            'juillet','août','septembre','octobre','novembre','décembre'];
const FR_MC=['jan','fév','mar','avr','mai','juin',
             'juil','août','sep','oct','nov','déc'];

function frFull(){const d=new Date();
  return `${FR_J[d.getDay()]} ${d.getDate()} ${FR_M[d.getMonth()]} ${d.getFullYear()}`;}
function frCourt(iso){if(!iso)return'—';const[,m,d]=iso.split('-');
  return `${parseInt(d)} ${FR_MC[parseInt(m)-1]}`;}
function tick(){const n=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('clock').textContent=
    `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;}
setInterval(tick,1000);tick();
document.getElementById('mlb-date').textContent=frFull();

// ══════════════════════════════════
// MLB
// ══════════════════════════════════
async function fetchMLB(){
  try{
    const r=await fetch(`${MLB_API}/api/dashboard`,{cache:'no-store'});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    renderMLB(await r.json());
  }catch(e){
    document.getElementById('gw-name').innerHTML=
      `<span class="err">⚠ API MLB : ${e.message}</span>`;
  }
}

function renderMLB(d){
  const gw=d.gameweek;
  document.getElementById('gw-name').textContent=gw.label||'—';
  document.getElementById('gw-dates').textContent=
    `${frCourt(gw.start_date)} → ${frCourt(gw.end_date)} ${gw.end_date?.slice(0,4)}`;
  document.getElementById('gw-prog').textContent=
    `J${gw.days_done}/${gw.days_total} · ${gw.days_left} restant(s)`;
  const tot=gw.team_total||0;
  const te=document.getElementById('gw-tot');
  te.textContent=`${tot>=0?'+':''}${tot.toFixed(1)} pts`;
  te.className=`gw-score-big ${tot>=0?'pos':'neg'}`;
  renderSo7(d.so7);
  renderCards(d.players||[]);
}

// ── So7 ──────────────────────────
function renderSo7(so7){
  const g=document.getElementById('so7-grid');
  const te=document.getElementById('so7-total');
  const ti=document.getElementById('so7-info');
  if(!so7||so7.error||!so7.lineup){
    g.innerHTML=`<div class="muted" style="grid-column:1/-1;font-size:.68rem">
      ${so7?.error||'Pas de données So7'}</div>`;
    te.textContent='';return;
  }
  g.innerHTML='';
  let filled=0;
  SLOT_ORDER.forEach(slot=>{
    const p=so7.lineup[slot];if(!p)return;
    filled++;
    const col=SLOT_COLORS[slot]||'#8b949e';
    const sc=p.total_gw||0;
    const el=document.createElement('div');el.className='sc';
    el.innerHTML=`
      <div class="sc-dot" style="background:${col}"></div>
      <div class="sc-info">
        <div class="sc-pos">${p.label}</div>
        <div class="sc-name">${p.name}</div>
        <div class="sc-team">${p.team} · ${p.position}</div>
      </div>
      <div class="sc-score ${sc>=0?'pos':'neg'}">${sc>=0?'+':''}${sc.toFixed(1)}</div>`;
    g.appendChild(el);
  });
  te.textContent=`Total So7 : ${so7.total>=0?'+':''}${so7.total.toFixed(1)} pts`;
  te.style.color=so7.total>=0?'var(--green)':'var(--red)';
  ti.textContent=`${filled}/7 slots`;
}

// ── Grille joueurs ────────────────
// Taille cible : card-w=96, gap=6 → 5 cartes = 5×96+4×6 = 504px
// On calcule combien rentrent dynamiquement
let _sorted=[];
let _pages=[];
let _pidx=0;
let _ptimer=null;

function renderCards(players){
  const vp=document.getElementById('cards-viewport');
  const dots=document.getElementById('pgdots');
  vp.innerHTML='';dots.innerHTML='';

  // Tri
  const actifs=players.filter(p=>p.score_today!=null)
                       .sort((a,b)=>b.score_today-a.score_today);
  const dns=players.filter(p=>p.score_today==null);
  _sorted=[...actifs,...dns];

  if(!_sorted.length){
    vp.innerHTML='<div class="muted" style="padding:16px">Aucun joueur.</div>';return;
  }

  // Calcul du nb de colonnes et de lignes qui tiennent dans le viewport
  const vpW=vp.parentElement.clientWidth-36; // padding 18×2
  const vpH=vp.clientHeight||240;
  const CARD_W=96,CARD_H=128,GAP=6;
  const cols=Math.max(4,Math.floor((vpW+GAP)/(CARD_W+GAP)));
  const rows=Math.max(1,Math.floor((vpH+GAP)/(CARD_H+GAP)));
  const perPage=cols*rows;

  // Découpe en pages
  _pages=[];
  for(let i=0;i<_sorted.length;i+=perPage)
    _pages.push(_sorted.slice(i,i+perPage));

  // Dots
  _pages.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===0?' on':'');
    d.onclick=()=>goPage(i);
    dots.appendChild(d);
  });

  _pidx=0;
  if(_ptimer)clearInterval(_ptimer);
  if(_pages.length>1)
    _ptimer=setInterval(()=>{_pidx=(_pidx+1)%_pages.length;showPage(cols);},PAGE_MS);
  showPage(cols);
}

function showPage(cols){
  const vp=document.getElementById('cards-viewport');
  vp.innerHTML='';
  document.querySelectorAll('.pdot').forEach((d,i)=>d.classList.toggle('on',i===_pidx));
  const page=_pages[_pidx]||[];

  // Découpe la page en rangées de `cols` cartes
  for(let r=0;r<page.length;r+=cols){
    const row=document.createElement('div');
    row.className='cards-row';
    page.slice(r,r+cols).forEach(p=>{
      row.appendChild(makeCard(p,_sorted.indexOf(p)+1));
    });
    vp.appendChild(row);
  }
}

function goPage(i){
  _pidx=i;
  const vpW=document.getElementById('cards-viewport').parentElement.clientWidth-36;
  const cols=Math.max(4,Math.floor((vpW+6)/(96+6)));
  showPage(cols);
  if(_ptimer)clearInterval(_ptimer);
  if(_pages.length>1)
    _ptimer=setInterval(()=>{_pidx=(_pidx+1)%_pages.length;showPage(cols);},PAGE_MS);
}

function makeCard(p,rank){
  const card=document.createElement('div');
  const rc=rank===1?'r1':rank===2?'r2':rank===3?'r3':'';
  const dns=p.score_today==null;
  card.className=`pcard ${rc}${dns?' dns-card':''}`;

  const rl=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
  const isP=p.role==='pitcher';
  const roleTxt=isP?`<span class="pc-role-p">P</span>`:`<span class="pc-role-h">H</span>`;

  const sc=p.score_today;
  const scCls=dns?'sc-dns':sc>=0?'sc-pos':'sc-neg';
  const scTxt=dns?'DNS':sc>=0?`+${sc.toFixed(1)}`:`${sc.toFixed(1)}`;

  const gv=p.score_gw||0;
  const gwLine=gv!==0
    ?`<div class="pc-score-gw">GW ${gv>=0?'+':''}${gv.toFixed(1)}</div>`:'';

  // Prénom seulement (plus court)
  const firstName=p.name.split(' ')[0];

  card.innerHTML=`
    <div class="pc-top">
      <span>${p.position} ${roleTxt}</span>
      <span class="pc-rank">${rl}</span>
    </div>
    <div class="pc-photo">
      <img src="${p.headshot}" alt="${p.name}"
        onerror="this.src='https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/0/headshot/67/current'"/>
    </div>
    <div class="pc-name" title="${p.name}">${firstName}</div>
    <div class="pc-score-wrap">
      <div class="pc-score-val ${scCls}">${scTxt}</div>
      ${gwLine}
    </div>`;
  return card;
}

// ══════════════════════════════════
// BRASSERIE
// ══════════════════════════════════
const ST={
  fermenting:{lbl:'Fermentation 🟢',css:'s-ferm',icon:'🧪'},
  ready:     {lbl:'Prêt à embout. ✅',css:'s-ready',icon:'⏳'},
  bottled:   {lbl:'Refermentation 🔵',css:'s-bottle',icon:'🍾'},
  done:      {lbl:'Terminé 🟣',css:'s-done',icon:'✅'},
};
let _brassins=[];
let _bidx=0,_btimer=null;

async function fetchBrew(){
  try{
    const r=await fetch(`${BREW_API}/api/brassins`,{cache:'no-store'});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    renderBrew(await r.json());
  }catch(e){
    document.getElementById('brew-sub').innerHTML=
      `<span class="err">⚠ Brassicole indisponible (port 8503)</span>`;
    document.getElementById('brew-cards').innerHTML=
      `<div class="err" style="margin:12px 18px">
        L'API Brassicole ne répond pas. Vérifier que api_brassicole.py tourne sur le port 8503.
       </div>`;
  }
}

function renderBrew(data){
  _brassins=data.brassins||[];
  const hm=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('brew-sub').textContent=
    `${data.count} brassin(s) · màj ${hm}`;
  document.getElementById('bchip-ferm').textContent=`🧪 ${data.actifs} actif(s)`;
  document.getElementById('bchip-tot').textContent=`🍺 ${data.count} brassin(s)`;

  const dots=document.getElementById('brew-dots');
  dots.innerHTML='';

  if(!_brassins.length){
    document.getElementById('brew-cards').innerHTML=
      `<div class="muted" style="padding:24px 18px;text-align:center">
        Aucun brassin. <a href="${BREW_APP}" target="_blank" style="color:var(--blue-l)">
        Créer le premier →</a></div>`;
    return;
  }

  _brassins.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===0?' on':'');
    d.onclick=()=>goBrew(i);
    dots.appendChild(d);
  });
  _bidx=0;
  if(_btimer)clearInterval(_btimer);
  if(_brassins.length>1)
    _btimer=setInterval(()=>{_bidx=(_bidx+1)%_brassins.length;showBrassin();},BREW_MS);
  showBrassin();
}

function showBrassin(){
  const b=_brassins[_bidx];if(!b)return;
  const st=ST[b.statut]||ST.fermenting;
  const pct=b.pct_bottle??b.pct_cuve??0;
  const abv=b.abv?`${b.abv}%`:'—';
  const att=b.attenuation_pct!=null?`${b.attenuation_pct}%`:'—';
  const tmp=b.derniere_temp?`${b.derniere_temp}°C`:'—';
  const dens=b.derniere_densite?b.derniere_densite.toFixed(3):'—';
  const isBottle=b.statut==='bottled';

  // Mini courbe densité
  let curve='';
  const hist=b.historique_densites||[];
  if(hist.length>=2){
    const vals=hist.map(m=>m.densite).filter(Boolean);
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||.001;
    curve=`<div class="dc">${hist.map(m=>{
      const h=Math.round(((m.densite-mn)/rng)*20+4);
      return `<div class="dcb" style="height:${h}px"
        title="${(m.date||'').slice(5)} : ${m.densite?.toFixed(3)||''}"></div>`;
    }).join('')}</div>`;
  }

  document.getElementById('brew-cards').innerHTML=`
<div class="bc">
  <div class="bc-hdr">
    <div class="bc-icon">${st.icon}</div>
    <div style="flex:1;min-width:0">
      <div class="bc-title">${b.nom}</div>
      <div class="bc-meta">${b.levure||''}${b.volume_l?` · ${b.volume_l}L`:''}${
        b.date_debut_cuve?` · Brassé ${frCourt(b.date_debut_cuve)}`:''}${
        b.jours_cuve!=null?` · J+${b.jours_cuve}`:''}</div>
    </div>
    <div class="bc-badge ${st.css}">${st.lbl}</div>
  </div>
  <div class="bc-body">
    <div class="bar-row">
      <div class="bar-bg">
        <div class="bar-f${isBottle?' btl':''}" style="width:${pct}%"></div>
      </div>
      <div class="bar-pct">${pct}%</div>
    </div>
    <div class="bstats">
      <div class="bst"><div class="bst-l">OG</div>
        <div class="bst-v">${b.og?b.og.toFixed(3):'—'}</div></div>
      <div class="bst"><div class="bst-l">Densité act.</div>
        <div class="bst-v" style="color:var(--blue-l)">${dens}</div></div>
      <div class="bst"><div class="bst-l">FG cible</div>
        <div class="bst-v">${b.fg_cible?b.fg_cible.toFixed(3):'—'}</div></div>
      <div class="bst"><div class="bst-l">ABV est.</div>
        <div class="bst-v" style="color:var(--amber)">${abv}</div></div>
      <div class="bst"><div class="bst-l">Atténuation</div>
        <div class="bst-v" style="color:var(--green)">${att}</div></div>
      <div class="bst"><div class="bst-l">Temp.</div>
        <div class="bst-v" style="color:var(--purple)">${tmp}</div></div>
      ${b.resucrage_g_per_l?`<div class="bst"><div class="bst-l">Resucrage</div>
        <div class="bst-v">${b.resucrage_g_per_l}g/L</div></div>`:''}
      ${b.date_fin_cuve?`<div class="bst"><div class="bst-l">Fin cuve</div>
        <div class="bst-v" style="font-size:.72rem">${frCourt(b.date_fin_cuve)}</div></div>`:''}
    </div>
    ${curve}
  </div>
</div>`;
  document.querySelectorAll('#brew-dots .pdot')
    .forEach((d,i)=>d.classList.toggle('on',i===_bidx));
}

function goBrew(i){
  _bidx=i;showBrassin();
  if(_btimer)clearInterval(_btimer);
  if(_brassins.length>1)
    _btimer=setInterval(()=>{_bidx=(_bidx+1)%_brassins.length;showBrassin();},BREW_MS);
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
fetchMLB();
fetchBrew();
setInterval(fetchMLB,  MLB_REFRESH);
setInterval(fetchBrew, BREW_REFRESH);
// Recalcul si resize
window.addEventListener('resize',()=>{
  if(_sorted.length) renderCards(_sorted.map(p=>({...p})));
});
</script>
</body>
</html>
