<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920"/>
<title>⚾ MLB × 🍺 Brasserie</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;
  --txt:#e6edf3;--dim:#8b949e;
  --grn:#3fb950;--red:#f85149;
  --blu:#388bfd;--blu-l:#79c0ff;
  --gld:#f1c40f;--amb:#ffa657;--pur:#d2a8ff;
  --font:'Inter',system-ui,sans-serif;
}
html,body{width:100vw;height:100vh;overflow:hidden;
  background:var(--bg);color:var(--txt);font-family:var(--font);}

/* ── Layout split ── */
#app{display:flex;width:100vw;height:100vh;}
.col{display:flex;flex-direction:column;overflow:hidden;}
#col-mlb {width:52vw;border-right:2px solid var(--bd);}
#col-brew{width:48vw;}

/* ── Header ── */
.hdr{height:52px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:0 16px;
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border-bottom:1px solid var(--bd);}
.hdr-title{font-size:.9rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
.hdr-sub  {font-size:.62rem;color:var(--dim);}
.clock    {font-size:1.25rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--blu-l);}

/* ── GW strip ── */
#gw-strip{flex-shrink:0;display:flex;align-items:center;gap:12px;padding:6px 16px;
  background:linear-gradient(135deg,#161b22,#1c2128);border-bottom:1px solid var(--bd);}
.gw-lbl{font-size:.5rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;}
.gw-name{font-size:.82rem;font-weight:700;}
.gw-dt  {font-size:.62rem;color:var(--dim);}
.gw-pill{background:var(--bg3);color:var(--blu-l);border-radius:4px;
  padding:2px 7px;font-size:.6rem;font-weight:700;white-space:nowrap;}
.gw-tot {font-size:1.35rem;font-weight:900;margin-left:auto;}
.pos{color:var(--grn);} .neg{color:var(--red);}

/* ── So7 section ── */
#so7-sec{flex-shrink:0;padding:7px 16px 5px;border-bottom:1px solid var(--bd);}
.sec-lbl{font-size:.52rem;font-weight:800;color:var(--dim);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
#so7-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
.slot{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;
  padding:4px 7px;display:flex;align-items:center;gap:5px;min-width:0;}
.s-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.s-body{flex:1;min-width:0;}
.s-pos {font-size:.48rem;font-weight:700;color:var(--dim);text-transform:uppercase;}
.s-name{font-size:.72rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.s-team{font-size:.52rem;color:var(--dim);}
.s-sc  {font-size:.88rem;font-weight:900;white-space:nowrap;flex-shrink:0;}
#so7-foot{text-align:right;font-size:.6rem;color:var(--dim);margin-top:2px;}

/* ── Cartes joueurs ── */
#players-area{flex:1;overflow:hidden;padding:6px 16px 8px;display:flex;flex-direction:column;gap:4px;}

/* Séparateur rôle */
.role-sep{display:flex;align-items:center;gap:6px;flex-shrink:0;
  font-size:.5rem;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;}
.role-sep::before,.role-sep::after{content:'';flex:1;height:1px;background:var(--bd);}

/* Grille cartes — taille FIXE, wrap */
.cards-grid{display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}

/* Carte — 100×130px FIXE */
.pc{width:100px;height:130px;flex-shrink:0;
  background:var(--bg2);border:2px solid var(--bd);border-radius:9px;
  overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s;}
.pc.r1{border-color:var(--gld);box-shadow:0 0 8px #f1c40f33;}
.pc.r2{border-color:#95a5a6;}
.pc.r3{border-color:#cd7f32;}
.pc.sp-card{border-color:#388bfd66;}  /* SP en bleu */
.pc.rp-card{border-color:#79c0ff66;}  /* RP en bleu clair */
.pc.dns{opacity:.45;}

.pc-top{flex-shrink:0;display:flex;justify-content:space-between;align-items:center;
  padding:2px 5px;background:rgba(0,0,0,.45);}
.pc-pos{font-size:.5rem;font-weight:700;color:var(--dim);}
.pc-rnk{font-size:.55rem;font-weight:800;color:var(--gld);}
.pc-p-badge{font-size:.44rem;font-weight:800;padding:0 3px;border-radius:3px;
  background:#21262d;color:var(--blu-l);border:1px solid var(--blu-l);}
.pc-h-badge{font-size:.44rem;font-weight:800;padding:0 3px;border-radius:3px;
  background:#1f6feb;color:#fff;}

.pc-img{flex:1;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;
  background:linear-gradient(180deg,#181f2c,#101520);padding:2px 1px 0;}
.pc-img img{width:100px;height:62px;object-fit:cover;object-position:top;
  border-radius:3px 3px 0 0;display:block;}

.pc-name{flex-shrink:0;font-size:.6rem;font-weight:700;text-align:center;
  padding:2px 3px 1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.pc-score{flex-shrink:0;background:#0a0e14;border-top:1px solid var(--bd);
  padding:3px 3px 4px;text-align:center;}
.sc-val{font-size:1rem;font-weight:900;line-height:1;}
.sc-pos{color:var(--grn);} .sc-neg{color:var(--red);} .sc-dns{color:var(--dim);font-size:.68rem;}
.sc-gw {font-size:.5rem;color:var(--blu-l);font-weight:700;margin-top:1px;}

/* Dots pagination */
#pg-dots{flex-shrink:0;display:flex;justify-content:center;gap:4px;padding:2px 0;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--bd);
  cursor:pointer;transition:background .2s,transform .2s;}
.dot.on{background:var(--blu);transform:scale(1.5);}

/* ══ BRASSERIE ══ */
#brew-statusbar{flex-shrink:0;display:flex;gap:6px;padding:5px 16px 3px;align-items:center;}
.bchip{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;
  padding:2px 8px;font-size:.6rem;font-weight:700;}
.brew-link{margin-left:auto;background:var(--bg3);border:1px solid #388bfd55;
  border-radius:5px;padding:2px 9px;font-size:.6rem;font-weight:700;
  color:var(--blu-l);text-decoration:none;}
.brew-link:hover{background:#1a2d4d;}

#brew-wrap{flex:1;overflow:hidden;padding:8px 16px 4px;}
.bc{background:linear-gradient(135deg,var(--bg2),#1a1f27);
  border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
.bc-hdr{display:flex;align-items:center;padding:9px 13px;gap:10px;border-bottom:1px solid var(--bd);}
.bc-icon{font-size:1.5rem;flex-shrink:0;}
.bc-title{font-size:.9rem;font-weight:800;}
.bc-meta{font-size:.6rem;color:var(--dim);margin-top:1px;}
.bc-badge{margin-left:auto;flex-shrink:0;padding:2px 8px;border-radius:9px;font-size:.58rem;font-weight:800;}
.s-ferm  {background:#1a4d3a;color:#3fb950;border:1px solid #3fb950;}
.s-ready {background:#2d3d1a;color:#8fe87e;border:1px solid #8fe87e;}
.s-bottle{background:#1a2d4d;color:var(--blu-l);border:1px solid var(--blu-l);}
.s-done  {background:#2d1a4d;color:var(--pur);border:1px solid var(--pur);}
.bc-body{padding:9px 13px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-bg {flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bar-f  {height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blu),var(--grn));}
.bar-f.btl{background:linear-gradient(90deg,var(--blu-l),var(--pur));}
.bar-pct{font-size:.68rem;font-weight:800;color:var(--blu-l);white-space:nowrap;}
.bstats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.bst{background:var(--bg3);border-radius:6px;padding:5px 7px;text-align:center;}
.bst-l{font-size:.48rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;}
.bst-v{font-size:.82rem;font-weight:800;margin-top:1px;}
.dc{display:flex;align-items:flex-end;gap:2px;height:24px;margin-top:7px;}
.dcb{flex:1;background:#1f6feb33;border:1px solid #388bfd44;border-radius:2px 2px 0 0;min-height:2px;}
#brew-dots{flex-shrink:0;display:flex;justify-content:center;gap:4px;padding:5px 0 3px;}

/* Erreur/loading */
.err{color:var(--red);font-size:.68rem;background:#6e1c1c;border-radius:5px;padding:3px 8px;}
.spin{animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
</style>
</head>
<body>
<div id="app">

<!-- ════════════════ MLB ════════════════ -->
<div class="col" id="col-mlb">

  <div class="hdr">
    <div>
      <div class="hdr-title">⚾ Sorare MLB</div>
      <div class="hdr-sub" id="mlb-date"></div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>

  <div id="gw-strip">
    <div>
      <div class="gw-lbl">Gameweek</div>
      <div class="gw-name" id="gw-name"><span class="spin" style="color:var(--dim)">…</span></div>
      <div class="gw-dt"   id="gw-dt"></div>
    </div>
    <div class="gw-pill" id="gw-prog"></div>
    <div class="gw-tot"  id="gw-tot">—</div>
  </div>

  <div id="so7-sec">
    <div class="sec-lbl">🏆 Meilleure So7 — GW en cours</div>
    <div id="so7-grid">
      <div class="spin" style="grid-column:1/-1;font-size:.65rem;color:var(--dim);padding:4px">Calcul…</div>
    </div>
    <div id="so7-foot"></div>
  </div>

  <div id="players-area">
    <div class="sec-lbl">📊 Scores du jour</div>
    <!-- Pitchers -->
    <div class="role-sep" id="sep-pitch" style="display:none">⚾ Pitchers</div>
    <div class="cards-grid" id="grid-pitch"></div>
    <!-- Hitters -->
    <div class="role-sep" id="sep-hit" style="display:none">🏏 Hitters</div>
    <div class="cards-grid" id="grid-hit"></div>
    <div id="pg-dots"></div>
  </div>

</div><!-- col-mlb -->

<!-- ════════════════ BRASSERIE ════════════════ -->
<div class="col" id="col-brew">

  <div class="hdr">
    <div>
      <div class="hdr-title">🍺 La Brasserie</div>
      <div class="hdr-sub" id="brew-sub">Chargement…</div>
    </div>
    <div style="font-size:1.4rem">🍻</div>
  </div>

  <div id="brew-statusbar">
    <div class="bchip" id="bchip-ferm">—</div>
    <div class="bchip" id="bchip-tot">—</div>
    <a class="brew-link" id="brew-link" href="#" target="_blank">✏️ Gérer →</a>
  </div>

  <div id="brew-wrap">
    <div id="brew-card-slot"></div>
  </div>
  <div id="brew-dots"></div>

</div>

</div><!-- #app -->
<script>
// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
const HOST     = window.location.hostname;
const MLB_API  = `http://${HOST}:8504`;
const BREW_API = `http://${HOST}:8503`;
const BREW_APP = `http://${HOST}:8502`;

const REFRESH_MLB  = 60_000;
const REFRESH_BREW = 120_000;

document.getElementById('brew-link').href = BREW_APP;

const SLOT_ORDER  = ['SP','RP','C_MI','CI','OF','XH','FLEX'];
const SLOT_COLORS = {SP:'#388bfd',RP:'#79c0ff',C_MI:'#d2a8ff',
  CI:'#f0883e',OF:'#3fb950',XH:'#ffa657',FLEX:'#ff7b72'};

// ── Horloge ──────────────────────────────
const FR_J  = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const FR_M  = ['janvier','février','mars','avril','mai','juin',
               'juillet','août','septembre','octobre','novembre','décembre'];
const FR_MC = ['jan','fév','mar','avr','mai','juin',
               'juil','août','sep','oct','nov','déc'];

function frFull(){
  const d=new Date();
  return `${FR_J[d.getDay()]} ${d.getDate()} ${FR_M[d.getMonth()]} ${d.getFullYear()}`;
}
function frCourt(iso){
  if(!iso)return'—';
  const[,m,d]=iso.split('-');
  return `${parseInt(d)} ${FR_MC[parseInt(m)-1]}`;
}
function tick(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('clock').textContent=
    `${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
}
setInterval(tick,1000); tick();
document.getElementById('mlb-date').textContent = frFull();

// ── MLB Fetch ─────────────────────────────
async function fetchMLB(){
  try{
    const r = await fetch(`${MLB_API}/api/dashboard`,{cache:'no-store'});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    renderMLB(await r.json());
  }catch(e){
    document.getElementById('gw-name').innerHTML=
      `<span class="err">⚠ API MLB : ${e.message}</span>`;
  }
}

function renderMLB(d){
  const gw = d.gameweek;
  document.getElementById('gw-name').textContent = gw.label||'—';
  document.getElementById('gw-dt').textContent =
    `${frCourt(gw.start_date)} → ${frCourt(gw.end_date)} ${(gw.end_date||'').slice(0,4)}`;
  document.getElementById('gw-prog').textContent =
    `J${gw.days_done}/${gw.days_total} · ${gw.days_left} restant(s)`;
  const tot = gw.team_total||0;
  const te  = document.getElementById('gw-tot');
  te.textContent = `${tot>=0?'+':''}${tot.toFixed(1)} pts`;
  te.className   = `gw-tot ${tot>=0?'pos':'neg'}`;
  renderSo7(d.so7);
  renderPlayers(d.players||[]);
}

// ── So7 ─────────────────────────────────
function renderSo7(so7){
  const g  = document.getElementById('so7-grid');
  const ft = document.getElementById('so7-foot');
  if(!so7||so7.error||!so7.lineup){
    g.innerHTML=`<div style="grid-column:1/-1;font-size:.65rem;color:var(--dim)">
      ${so7?.error||'Pas de données So7'}</div>`;
    ft.textContent=''; return;
  }
  g.innerHTML='';
  SLOT_ORDER.forEach(slot=>{
    const p=so7.lineup[slot]; if(!p) return;
    const col=SLOT_COLORS[slot]||'#8b949e';
    const sc=p.total_gw||0;
    const el=document.createElement('div'); el.className='slot';
    el.innerHTML=`
      <div class="s-dot" style="background:${col}"></div>
      <div class="s-body">
        <div class="s-pos">${p.label}</div>
        <div class="s-name">${p.name}</div>
        <div class="s-team">${p.team} · ${p.position}</div>
      </div>
      <div class="s-sc ${sc>=0?'pos':'neg'}">${sc>=0?'+':''}${sc.toFixed(1)}</div>`;
    g.appendChild(el);
  });
  ft.textContent = `Total So7 : ${so7.total>=0?'+':''}${so7.total.toFixed(1)} pts`;
  ft.style.color = so7.total>=0?'var(--grn)':'var(--red)';
}

// ── Cartes joueurs — pitchers SÉPARÉS des hitters ──
function renderPlayers(players){
  const pitchers = players.filter(p=>p.role==='pitcher')
                          .sort((a,b)=>(b.score_today||0)-(a.score_today||0));
  const hitters  = players.filter(p=>p.role!=='pitcher')
                          .sort((a,b)=>(b.score_today||0)-(a.score_today||0));

  const gPitch = document.getElementById('grid-pitch');
  const gHit   = document.getElementById('grid-hit');
  const sepP   = document.getElementById('sep-pitch');
  const sepH   = document.getElementById('sep-hit');
  gPitch.innerHTML=''; gHit.innerHTML='';

  if(pitchers.length){
    sepP.style.display='flex';
    pitchers.forEach(p=>gPitch.appendChild(makeCard(p,'pitcher')));
  } else { sepP.style.display='none'; }

  if(hitters.length){
    sepH.style.display='flex';
    hitters.forEach((p,i)=>gHit.appendChild(makeCard(p,'hitter',i+1)));
  } else { sepH.style.display='none'; }
}

function makeCard(p, role, rank=0){
  const card = document.createElement('div');
  const isP  = role==='pitcher';
  const pos  = p.position||'?';
  const dns  = p.score_today==null;

  // Classe de la carte
  let cls = 'pc';
  if(!dns && rank===1) cls+=' r1';
  else if(!dns && rank===2) cls+=' r2';
  else if(!dns && rank===3) cls+=' r3';
  if(dns) cls+=' dns';
  if(isP && pos==='SP') cls+=' sp-card';
  if(isP && (pos==='RP'||pos==='CL')) cls+=' rp-card';
  card.className=cls;

  const rl = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
  const badge = isP
    ? `<span class="pc-p-badge">${pos}</span>`
    : `<span class="pc-h-badge">H</span>`;

  const sc = p.score_today;
  const scCls = dns?'sc-dns':sc>=0?'sc-pos':'sc-neg';
  const scTxt = dns?'DNS':sc>=0?`+${sc.toFixed(1)}`:`${sc.toFixed(1)}`;

  const gv = p.score_gw||0;
  const gwHtml = gv!==0
    ?`<div class="sc-gw">GW ${gv>=0?'+':''}${gv.toFixed(1)}</div>`:'';

  const fn = p.name.split(' ').slice(-1)[0]; // nom de famille (plus discriminant)

  card.innerHTML=`
    <div class="pc-top">
      <span class="pc-pos">${badge}</span>
      <span class="pc-rnk">${rl}</span>
    </div>
    <div class="pc-img">
      <img src="${p.headshot}" alt="${p.name}"
        onerror="this.src='https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_213,q_auto:best/v1/people/0/headshot/67/current'"/>
    </div>
    <div class="pc-name" title="${p.name}">${fn}</div>
    <div class="pc-score">
      <div class="sc-val ${scCls}">${scTxt}</div>
      ${gwHtml}
    </div>`;
  return card;
}

// ════════════════════════════════════════
// BRASSERIE
// ════════════════════════════════════════
const ST_BREW={
  fermenting:{lbl:'Fermentation 🟢',css:'s-ferm',icon:'🧪'},
  ready:     {lbl:'Prêt à embout. ✅',css:'s-ready',icon:'⏳'},
  bottled:   {lbl:'Refermentation 🔵',css:'s-bottle',icon:'🍾'},
  done:      {lbl:'Terminé 🟣',css:'s-done',icon:'✅'},
};
let _brassins=[],_bidx=0,_btimer=null;

async function fetchBrew(){
  try{
    const r=await fetch(`${BREW_API}/api/brassins`,{cache:'no-store'});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    renderBrew(await r.json());
  }catch(e){
    document.getElementById('brew-sub').innerHTML=
      `<span class="err">⚠ Brassicole inaccessible (port 8503)</span>`;
    document.getElementById('brew-card-slot').innerHTML=
      `<div class="err" style="margin:8px 0">L'API Brassicole ne répond pas.</div>`;
  }
}

function renderBrew(data){
  _brassins=data.brassins||[];
  const hm=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('brew-sub').textContent=`${data.count} brassin(s) · màj ${hm}`;
  document.getElementById('bchip-ferm').textContent=`🧪 ${data.actifs} actif(s)`;
  document.getElementById('bchip-tot').textContent=`🍺 ${data.count} total`;

  const dots=document.getElementById('brew-dots');
  dots.innerHTML='';
  if(!_brassins.length){
    document.getElementById('brew-card-slot').innerHTML=
      `<div style="padding:20px;text-align:center;color:var(--dim)">
        Aucun brassin. <a href="${BREW_APP}" target="_blank" style="color:var(--blu-l)">
        Créer le premier →</a></div>`;
    return;
  }
  _brassins.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.onclick=()=>goBrew(i); dots.appendChild(d);
  });
  _bidx=0;
  if(_btimer) clearInterval(_btimer);
  if(_brassins.length>1)
    _btimer=setInterval(()=>{_bidx=(_bidx+1)%_brassins.length;showBrassin();},8000);
  showBrassin();
}

function showBrassin(){
  const b=_brassins[_bidx]; if(!b) return;
  const st=ST_BREW[b.statut]||ST_BREW.fermenting;
  const pct=b.pct_bottle??b.pct_cuve??0;
  const abv=b.abv?`${b.abv}%`:'—';
  const att=b.attenuation_pct!=null?`${b.attenuation_pct}%`:'—';
  const tmp=b.derniere_temp?`${b.derniere_temp}°C`:'—';
  const dens=b.derniere_densite?b.derniere_densite.toFixed(3):'—';
  const isBottle=b.statut==='bottled';

  let curve='';
  const hist=b.historique_densites||[];
  if(hist.length>=2){
    const vals=hist.map(m=>m.densite).filter(Boolean);
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||.001;
    curve=`<div class="dc">${hist.map(m=>{
      const h=Math.round(((m.densite-mn)/rng)*18+4);
      return `<div class="dcb" style="height:${h}px"
        title="${(m.date||'').slice(5)} : ${m.densite?.toFixed(3)||''}"></div>`;
    }).join('')}</div>`;
  }

  document.getElementById('brew-card-slot').innerHTML=`
<div class="bc">
  <div class="bc-hdr">
    <div class="bc-icon">${st.icon}</div>
    <div style="flex:1;min-width:0">
      <div class="bc-title">${b.nom}</div>
      <div class="bc-meta">${b.levure||''}${b.volume_l?` · ${b.volume_l}L`:''}${
        b.date_debut_cuve?` · Brassé ${frCourt(b.date_debut_cuve)}`:''}${
        b.jours_cuve!=null?` · J+${b.jours_cuve}`:''}</div>
    </div>
    <div class="bc-badge ${st.css}">${st.lbl}</div>
  </div>
  <div class="bc-body">
    <div class="bar-row">
      <div class="bar-bg">
        <div class="bar-f${isBottle?' btl':''}" style="width:${pct}%"></div>
      </div>
      <div class="bar-pct">${pct}%</div>
    </div>
    <div class="bstats">
      <div class="bst"><div class="bst-l">OG</div>
        <div class="bst-v">${b.og?b.og.toFixed(3):'—'}</div></div>
      <div class="bst"><div class="bst-l">Densité</div>
        <div class="bst-v" style="color:var(--blu-l)">${dens}</div></div>
      <div class="bst"><div class="bst-l">FG cible</div>
        <div class="bst-v">${b.fg_cible?b.fg_cible.toFixed(3):'—'}</div></div>
      <div class="bst"><div class="bst-l">ABV est.</div>
        <div class="bst-v" style="color:var(--amb)">${abv}</div></div>
      <div class="bst"><div class="bst-l">Atténuation</div>
        <div class="bst-v" style="color:var(--grn)">${att}</div></div>
      <div class="bst"><div class="bst-l">Temp.</div>
        <div class="bst-v" style="color:var(--pur)">${tmp}</div></div>
      ${b.resucrage_g_per_l?`<div class="bst"><div class="bst-l">Resucrage</div>
        <div class="bst-v">${b.resucrage_g_per_l}g/L</div></div>`:''}
      ${b.date_fin_cuve?`<div class="bst"><div class="bst-l">Fin cuve</div>
        <div class="bst-v" style="font-size:.7rem">${frCourt(b.date_fin_cuve)}</div></div>`:''}
    </div>
    ${curve}
  </div>
</div>`;
  document.querySelectorAll('#brew-dots .dot')
    .forEach((d,i)=>d.classList.toggle('on',i===_bidx));
}
function goBrew(i){
  _bidx=i; showBrassin();
  if(_btimer) clearInterval(_btimer);
  if(_brassins.length>1)
    _btimer=setInterval(()=>{_bidx=(_bidx+1)%_brassins.length;showBrassin();},8000);
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════
fetchMLB();
fetchBrew();
setInterval(fetchMLB,  REFRESH_MLB);
setInterval(fetchBrew, REFRESH_BREW);
</script>
</body>
</html>
